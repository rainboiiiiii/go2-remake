# Render Blueprint — only applied when you deploy via "New > Blueprint".
# If you created the Web Service manually, set env vars in the Render dashboard instead.

services:
  - type: web
    name: go2super-server
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: GAME_TRANSPORT
        value: websocket
      - key: PUBLIC_BASE_URL
        sync: false
      - key: SPRING_DATA_MONGODB_URI
        sync: false
